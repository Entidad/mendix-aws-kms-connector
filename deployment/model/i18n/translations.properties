d1d1e239-48a7-40f2-a906-e648eb9ed444=--------------------------------------------------------------\r\nREAD ME \r\n--------------------------------------------------------------\r\n\r\nThis folder contains reusable UI logic. Its use is OPTIONAL and is specifically intended for use cases where \n\n- region and\n- type of credentials\n\nare to be managed at runtime. If you want to apply changes to this logic, best replicate the applicable code from the connector inside of a custom module and change it there.\r\n\r\n\r\nCONFIGURATION\r\n\r\nAssign the AWSAuthentication.Admin module role to any application roles that should have permissions to edit the region or credential type at runtime. Finally, add the SNIPPET_AWSAuthentication_Settings to a page accessible by these application roles.
