36b5a989-42ad-47e2-af25-79c064c0707c=This is a comprehensive AWS Key Management Service (KMS) connector module for Mendix applications. It provides Java-based custom activities that enable secure cryptographic operations using The AWS Java SDK for AWS KMS, including key creation, encryption, decryption, and data key generation.
